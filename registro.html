<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unirse al Círculo | Grimorio Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .register-card {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 20px var(--glow);
        }
        .register-card p {
            margin-bottom: 25px;
            color: #ccc;
            font-size: 0.9rem;
        }
        .register-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 5px;
            color: white;
            font-family: 'Quicksand', sans-serif;
            outline: none;
            transition: 0.3s;
        }
        .register-input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.1);
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
            opacity: 0.7;
        }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <canvas id="canvas-stars"></canvas>

    <div class="register-container">
        <div class="register-card">
            <span class="nav-logo" style="font-size: 2rem; display: block; margin-bottom: 10px;">Grimorio</span>
            <h1 class="magic-title" style="font-size: 1.5rem; margin-bottom: 10px;">Inscripción Arcana</h1>
            <p>Introduce tu correo para recibir las crónicas del oráculo y sabiduría ancestral.</p>

            <form action="https://script.google.com/macros/s/AKfycbx1fTP_cGUDq9kj4kp0_9ChMfjQV0c4oeRg4rdK21-7cuLPY1D21mkEa4LVtcYwzNvILA/exec" method="POST">
                <input type="email" name="email" class="register-input" placeholder="tu-correo@ejemplo.com" required>
                
                <button type="submit" class="magic-button" style="width: 100%;">
                    Consagrar Registro
                </button>
            </form>

            <a href="index.html" class="back-link">← Volver al inicio</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
