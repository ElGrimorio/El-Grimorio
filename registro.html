<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Arcana | Grimorio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .register-card {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 20px var(--glow);
        }
        .register-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            color: white;
            border-radius: 5px;
            font-family: 'Quicksand', sans-serif;
            outline: none;
        }
        #mensaje-exito {
            display: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <canvas id="canvas-stars"></canvas>

    <div class="register-container">
        <div class="register-card" id="form-container">
            <span class="nav-logo" style="font-size: 2rem; display: block; margin-bottom: 10px;">Grimorio</span>
            <h1 class="magic-title" id="titulo">Inscripción Arcana</h1>
            <p id="descripcion" style="color: #ccc; margin-bottom: 25px;">Deja tu rastro digital para recibir las crónicas del oráculo.</p>

            <script type="text/javascript">var submitted=false;</script>
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" 
                onload="if(submitted) {showSuccess();}"></iframe>

            <form action="https://script.google.com/macros/s/AKfycbx1fTP_cGUDq9kj4kp0_9ChMfjQV0c4oeRg4rdK21-7cuLPY1D21mkEa4LVtcYwzNvILA/exec" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                <input type="email" name="email" class="register-input" placeholder="tu-correo@ejemplo.com" required>
                
                <button type="submit" class="magic-button" style="width: 100%;">
                    Consagrar Registro
                </button>
            </form>

            <div id="mensaje-exito">
                <p style="font-size: 1.2rem; margin-bottom: 20px;">¡Tu alma ha sido registrada en el Círculo!</p>
                <a href="index.html" class="magic-button" style="text-decoration: none; display: inline-block; width: 100%;">
                    Regresar al Oráculo
                </a>
            </div>

            <a href="index.html" id="link-volver" style="display: block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 0.8rem;">
                ← Cancelar
            </a>
        </div>
    </div>

    <script>
        function showSuccess() {
            // Ocultamos elementos del formulario
            document.querySelector('form').style.display = 'none';
            document.getElementById('titulo').style.display = 'none';
            document.getElementById('descripcion').style.display = 'none';
            document.getElementById('link-volver').style.display = 'none';
            
            // Mostramos el mensaje y el botón de retorno
            document.getElementById('mensaje-exito').style.display = 'block';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
